name: Deploy Discord Bot

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # зависший тест не должен блокировать деплой на прод часами

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_IP }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            # set -e: упавший pip раньше молча пропускался, и бот рестартовал
            # с новым кодом без новых зависимостей (прецедент 12.07.2026: ddgs)
            set -e
            cd /opt/robocat
            git pull origin master
            # venv вместо системного pip3 --break-system-packages:
            # после сноса VDS 18.07.2026 бот живёт в /opt/robocat под юзером bots
            .venv/bin/pip install -r requirements.txt -q
            sudo -n systemctl restart robocat